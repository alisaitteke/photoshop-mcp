<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260" font-family="Helvetica, Arial, sans-serif">
  <rect width="640" height="260" rx="12" fill="#f6f8fa"/>
  <text x="320" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">photoshop_recipe_export_social_variants</text>
  <text x="320" y="48" text-anchor="middle" font-size="11" fill="#57606a">one document → one JPEG per platform, center-cropped to spec</text>

  <defs>
    <linearGradient id="socialimg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9b24e"/>
      <stop offset="1" stop-color="#e2607a"/>
    </linearGradient>
    <clipPath id="igClip"><rect x="238" y="76" width="72" height="72" rx="5"/></clipPath>
    <clipPath id="stClip"><rect x="330" y="66" width="50" height="90" rx="5"/></clipPath>
    <clipPath id="xClip"><rect x="400" y="86" width="104" height="58" rx="5"/></clipPath>
  </defs>

  <!-- source doc -->
  <rect x="40" y="70" width="150" height="100" rx="6" fill="url(#socialimg)"/>
  <circle cx="90" cy="100" r="14" fill="#fff3d6" opacity="0.9"/>
  <polygon points="40,170 120,116 190,170" fill="#3b2f4a" opacity="0.8"/>
  <rect x="40" y="70" width="150" height="100" rx="6" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="115" y="186" text-anchor="middle" font-size="11" fill="#57606a">active document</text>

  <!-- fan lines -->
  <line x1="196" y1="112" x2="234" y2="112" stroke="#9fa7ae" stroke-width="1.5"/>
  <line x1="196" y1="120" x2="326" y2="106" stroke="#9fa7ae" stroke-width="1.5"/>
  <line x1="196" y1="128" x2="396" y2="118" stroke="#9fa7ae" stroke-width="1.5"/>

  <!-- IG square -->
  <g clip-path="url(#igClip)"><rect x="238" y="76" width="72" height="72" fill="url(#socialimg)"/><polygon points="238,148 280,108 310,148" fill="#3b2f4a" opacity="0.8"/></g>
  <rect x="238" y="76" width="72" height="72" rx="5" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="274" y="164" text-anchor="middle" font-size="9.5" fill="#57606a">IG post</text>
  <text x="274" y="176" text-anchor="middle" font-size="9.5" fill="#57606a">1080²</text>

  <!-- Story -->
  <g clip-path="url(#stClip)"><rect x="330" y="66" width="50" height="90" fill="url(#socialimg)"/><polygon points="330,156 358,116 380,156" fill="#3b2f4a" opacity="0.8"/></g>
  <rect x="330" y="66" width="50" height="90" rx="5" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="355" y="164" text-anchor="middle" font-size="9.5" fill="#57606a">story</text>
  <text x="355" y="176" text-anchor="middle" font-size="9.5" fill="#57606a">1080×1920</text>

  <!-- X post -->
  <g clip-path="url(#xClip)"><rect x="400" y="86" width="104" height="58" fill="url(#socialimg)"/><polygon points="400,144 456,104 504,144" fill="#3b2f4a" opacity="0.8"/></g>
  <rect x="400" y="86" width="104" height="58" rx="5" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="452" y="164" text-anchor="middle" font-size="9.5" fill="#57606a">X post</text>
  <text x="452" y="176" text-anchor="middle" font-size="9.5" fill="#57606a">1600×900</text>

  <!-- more chip -->
  <rect x="524" y="96" width="76" height="40" rx="8" fill="#eaeef2"/>
  <text x="562" y="113" text-anchor="middle" font-size="10" font-weight="700" fill="#1f2328">+9 more</text>
  <text x="562" y="127" text-anchor="middle" font-size="9" fill="#57606a">12 platforms</text>

  <rect x="30" y="200" width="580" height="46" rx="8" fill="#eaeef2"/>
  <text x="44" y="220" font-size="11.5" fill="#1f2328" font-weight="600">instagram · x · facebook · linkedin · youtube · tiktok · pinterest</text>
  <text x="44" y="237" font-size="11" fill="#57606a">center-crop to aspect — no letterboxing, source unchanged</text>
</svg>
