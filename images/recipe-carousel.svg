<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260" font-family="Helvetica, Arial, sans-serif">
  <rect width="640" height="260" rx="12" fill="#f6f8fa"/>
  <text x="320" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">photoshop_recipe_split_carousel</text>
  <text x="320" y="48" text-anchor="middle" font-size="11" fill="#57606a">one wide document → numbered slides in swipe order</text>

  <!-- source panorama -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f9b24e"/>
      <stop offset="0.5" stop-color="#e2607a"/>
      <stop offset="1" stop-color="#4158d0"/>
    </linearGradient>
    <linearGradient id="skyA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f9b24e"/>
      <stop offset="1" stop-color="#ef8a63"/>
    </linearGradient>
    <linearGradient id="skyB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ef8a63"/>
      <stop offset="1" stop-color="#9c5db8"/>
    </linearGradient>
    <linearGradient id="skyC" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9c5db8"/>
      <stop offset="1" stop-color="#4158d0"/>
    </linearGradient>
    <clipPath id="pano"><rect x="30" y="70" width="280" height="70" rx="6"/></clipPath>
  </defs>
  <g clip-path="url(#pano)">
    <rect x="30" y="70" width="280" height="70" fill="url(#sky)"/>
    <circle cx="80" cy="95" r="14" fill="#fff3d6" opacity="0.9"/>
    <polygon points="30,140 110,96 170,140" fill="#3b2f4a" opacity="0.85"/>
    <polygon points="140,140 230,88 310,140" fill="#2a2140" opacity="0.9"/>
  </g>
  <rect x="30" y="70" width="280" height="70" rx="6" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
  <!-- slice guides -->
  <line x1="123" y1="70" x2="123" y2="140" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>
  <line x1="216" y1="70" x2="216" y2="140" stroke="#ffffff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.8"/>
  <text x="170" y="158" text-anchor="middle" font-size="11" fill="#57606a">active document · 5400×1350 px</text>

  <!-- arrow -->
  <line x1="325" y1="105" x2="365" y2="105" stroke="#57606a" stroke-width="2"/>
  <polygon points="365,99 377,105 365,111" fill="#57606a"/>

  <!-- slides -->
  <g>
    <rect x="390" y="66" width="64" height="80" rx="5" fill="url(#skyA)"/>
    <rect x="390" y="66" width="64" height="80" rx="5" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
    <text x="422" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">01</text>
  </g>
  <g>
    <rect x="466" y="66" width="64" height="80" rx="5" fill="url(#skyB)"/>
    <rect x="466" y="66" width="64" height="80" rx="5" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
    <text x="498" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">02</text>
  </g>
  <g>
    <rect x="542" y="66" width="64" height="80" rx="5" fill="url(#skyC)"/>
    <rect x="542" y="66" width="64" height="80" rx="5" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
    <text x="574" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">03</text>
  </g>
  <text x="498" y="158" text-anchor="middle" font-size="11" fill="#57606a">carousel-01.jpg … carousel-NN.jpg</text>

  <!-- footer -->
  <rect x="30" y="188" width="580" height="52" rx="8" fill="#eaeef2"/>
  <text x="44" y="209" font-size="11.5" fill="#1f2328" font-weight="600">slides: 2–10 · optional resize per slide (e.g. 1080×1350) · jpg/png</text>
  <text x="44" y="227" font-size="11" fill="#57606a">source document untouched · files land in ~/.photoshop-mcp/exports</text>
</svg>
