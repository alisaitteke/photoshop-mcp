<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260" font-family="Helvetica, Arial, sans-serif">
  <rect width="640" height="260" rx="12" fill="#f6f8fa"/>
  <text x="320" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2328">photoshop_recipe_prepare_for_web</text>
  <text x="320" y="48" text-anchor="middle" font-size="11" fill="#57606a">sRGB + downscale + sharpen + optimized JPEG in one step</text>

  <defs>
    <linearGradient id="webimg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fb2e5"/>
      <stop offset="1" stop-color="#3d6db5"/>
    </linearGradient>
    <g id="land">
      <circle cx="30" cy="24" r="10" fill="#fff3d6" opacity="0.9"/>
      <polygon points="0,120 70,58 120,120" fill="#2f3b52" opacity="0.8"/>
      <polygon points="80,120 140,70 180,120" fill="#232c40" opacity="0.85"/>
    </g>
  </defs>

  <!-- source -->
  <rect x="40" y="66" width="180" height="120" rx="6" fill="url(#webimg)"/>
  <use href="#land" x="40" y="66"/>
  <rect x="40" y="66" width="180" height="120" rx="6" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="130" y="202" text-anchor="middle" font-size="11" fill="#57606a">4000×3000 · 8.4 MB</text>

  <!-- arrow -->
  <line x1="236" y1="126" x2="276" y2="126" stroke="#57606a" stroke-width="2"/>
  <polygon points="276,120 288,126 276,132" fill="#57606a"/>

  <!-- output -->
  <rect x="304" y="86" width="120" height="80" rx="6" fill="url(#webimg)"/>
  <g transform="translate(304,86) scale(0.667)"><use href="#land"/></g>
  <rect x="304" y="86" width="120" height="80" rx="6" fill="none" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="364" y="202" text-anchor="middle" font-size="11" fill="#57606a">1200×900 · 320 KB</text>

  <!-- badges -->
  <g font-size="10.5" font-weight="600" fill="#1f2328">
    <rect x="452" y="72" width="150" height="26" rx="13" fill="#eaeef2"/>
    <text x="527" y="89" text-anchor="middle">sRGB profile</text>
    <rect x="452" y="106" width="150" height="26" rx="13" fill="#eaeef2"/>
    <text x="527" y="123" text-anchor="middle">export sharpen</text>
    <rect x="452" y="140" width="150" height="26" rx="13" fill="#eaeef2"/>
    <text x="527" y="157" text-anchor="middle">quality 1–12</text>
  </g>

  <rect x="30" y="212" width="580" height="36" rx="8" fill="#eaeef2"/>
  <text x="44" y="234" font-size="11.5" fill="#1f2328" font-weight="600">source untouched · JPEG lands in ~/.photoshop-mcp/exports</text>
</svg>
