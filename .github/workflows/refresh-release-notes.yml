# Rebuild GitHub Release notes for an existing tag — run after npm publish so the
# release body shows "✅ Published on npm." See CONTRIBUTING.md § Releasing.
name: Refresh Release Notes

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to refresh (e.g. v1.3.9)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  refresh-release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh release notes
        env:
          TAG: ${{ inputs.tag }}
        run: bash scripts/refresh-release-notes.sh "$TAG"
